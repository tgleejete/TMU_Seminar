
<style>
.panel { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 10px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.lbl { font-size: 12px; color: var(--color-text-secondary); min-width: 100px; }
.val { font-size: 12px; font-weight: 500; min-width: 44px; color: var(--color-text-primary); }
.sec-title { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 8px; letter-spacing: 0.03em; }
.stat-row { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; margin-bottom: 10px; }
.stat { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 8px 10px; }
.stat-lbl { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 3px; }
.stat-val { font-size: 17px; font-weight: 500; }
.hint { font-size: 11px; color: var(--color-text-tertiary); margin-top: 6px; }
canvas { width: 100%; display: block; border-radius: var(--border-radius-md); }
</style>

<div class="grid2">
  <div class="panel">
    <div class="sec-title">Covariates（改變族群均值）</div>
    <div class="row">
      <span class="lbl">WT (kg)</span>
      <input type="range" min="40" max="120" step="1" value="60" id="wt" style="flex:1">
      <span class="val" id="wt-v">60</span>
    </div>
    <div class="row">
      <span class="lbl">ALB 係數 α</span>
      <input type="range" min="0" max="1" step="0.05" value="0" id="alb" style="flex:1">
      <span class="val" id="alb-v">0.00</span>
    </div>
  </div>
  <div class="panel">
    <div class="sec-title">Dose history（驅動 ODE）</div>
    <div class="row">
      <span class="lbl">第 1 劑 (mg)</span>
      <input type="range" min="100" max="600" step="50" value="300" id="d1" style="flex:1">
      <span class="val" id="d1-v">300</span>
    </div>
    <div class="row">
      <span class="lbl">第 2 劑時間 (h)</span>
      <input type="range" min="24" max="168" step="12" value="72" id="t2" style="flex:1">
      <span class="val" id="t2-v">72</span>
    </div>
    <div class="row">
      <span class="lbl">第 2 劑 (mg)</span>
      <input type="range" min="0" max="600" step="50" value="0" id="d2" style="flex:1">
      <span class="val" id="d2-v">0</span>
    </div>
  </div>
</div>

<div class="panel" style="margin-bottom:10px">
  <div class="sec-title">觀測點（DV）</div>
  <div style="display:flex;gap:16px;flex-wrap:wrap">
    <div class="row" style="margin-bottom:0">
      <span class="lbl">DV @ t=14h</span>
      <input type="range" min="0.2" max="8" step="0.1" value="3.5" id="dv1" style="width:120px">
      <span class="val" id="dv1-v">3.5</span>
    </div>
    <div class="row" style="margin-bottom:0">
      <span class="lbl">DV @ t=80h</span>
      <input type="range" min="0" max="6" step="0.1" value="0" id="dv2" style="width:120px">
      <span class="val" id="dv2-v">off</span>
    </div>
  </div>
</div>

<div class="stat-row">
  <div class="stat">
    <div class="stat-lbl">族群 CL (L/h)</div>
    <div class="stat-val" id="s-popCL" style="color:#534AB7">—</div>
  </div>
  <div class="stat">
    <div class="stat-lbl">MAP η*</div>
    <div class="stat-val" id="s-eta" style="color:#1D9E75">—</div>
  </div>
  <div class="stat">
    <div class="stat-lbl">個體 CL (L/h)</div>
    <div class="stat-val" id="s-indCL" style="color:#185FA5">—</div>
  </div>
  <div class="stat">
    <div class="stat-lbl">總 OFV</div>
    <div class="stat-val" id="s-ofv">—</div>
  </div>
</div>

<canvas id="cv" height="260"></canvas>
<p class="hint">紫色虛線 = 族群預測（η=0）｜藍色實線 = MAP 個體預測（η*）｜橘點 = 觀測 DV｜綠色垂直線 = 給藥時間點｜灰色垂直線 = 第 2 劑</p>

<script>
const OMEGA = 0.1, SIGMA_PROP = 0.04, SIGMA_ADD = 0.01, V = 5;

function getCL_pop(wt, alb) {
  return 0.25 * Math.pow(wt/70, 0.75) * Math.exp(alb * 0.3);
}
function getCL_ind(cl_pop, eta) { return cl_pop * Math.exp(eta); }

function solveCONC(t, cl, doses) {
  let c = 0;
  for (const d of doses) {
    if (d.time <= t) {
      c += (d.amt / V) * Math.exp(-(cl/V)*(t - d.time));
    }
  }
  return Math.max(0, c);
}

function residTerm(eta, cl_pop, doses, obs) {
  const cl = getCL_ind(cl_pop, eta);
  let s = 0;
  for (const o of obs) {
    const pred = solveCONC(o.t, cl, doses);
    const sig2 = SIGMA_PROP * pred * pred + SIGMA_ADD;
    s += Math.pow(o.dv - pred, 2) / sig2;
  }
  return s;
}
function priorTerm(eta) { return (eta*eta)/OMEGA; }
function ofv(eta, cl_pop, doses, obs) { return priorTerm(eta) + residTerm(eta, cl_pop, doses, obs); }

function findMap(cl_pop, doses, obs) {
  let best = 0, bestV = 1e9;
  for (let e = -2.5; e <= 2.5; e += 0.005) {
    const v = ofv(e, cl_pop, doses, obs);
    if (v < bestV) { bestV = v; best = e; }
  }
  return best;
}

function getInputs() {
  const wt   = +document.getElementById('wt').value;
  const alb  = +document.getElementById('alb').value;
  const d1   = +document.getElementById('d1').value;
  const t2   = +document.getElementById('t2').value;
  const d2   = +document.getElementById('d2').value;
  const dv1  = +document.getElementById('dv1').value;
  const dv2  = +document.getElementById('dv2').value;
  return { wt, alb, d1, t2, d2, dv1, dv2 };
}

function update() {
  const { wt, alb, d1, t2, d2, dv1, dv2 } = getInputs();

  document.getElementById('wt-v').textContent  = wt;
  document.getElementById('alb-v').textContent = alb.toFixed(2);
  document.getElementById('d1-v').textContent  = d1;
  document.getElementById('t2-v').textContent  = t2;
  document.getElementById('d2-v').textContent  = d2;
  document.getElementById('dv1-v').textContent = dv1.toFixed(1);
  document.getElementById('dv2-v').textContent = dv2 > 0 ? dv2.toFixed(1) : 'off';

  const doses = [{ time: 0, amt: d1 }];
  if (d2 > 0) doses.push({ time: t2, amt: d2 });

  const obs = [{ t: 14, dv: dv1 }];
  if (dv2 > 0) obs.push({ t: Math.max(t2 + 4, 80), dv: dv2 });

  const cl_pop = getCL_pop(wt, alb);
  const etaStar = findMap(cl_pop, doses, obs);
  const cl_ind  = getCL_ind(cl_pop, etaStar);
  const totalOFV = ofv(etaStar, cl_pop, doses, obs);

  document.getElementById('s-popCL').textContent = cl_pop.toFixed(3);
  document.getElementById('s-eta').textContent   = etaStar.toFixed(3);
  document.getElementById('s-indCL').textContent = cl_ind.toFixed(3);
  document.getElementById('s-ofv').textContent   = totalOFV.toFixed(2);

  draw(cl_pop, cl_ind, doses, obs, t2, d2);
}

function draw(cl_pop, cl_ind, doses, obs, t2, d2) {
  const cv = document.getElementById('cv');
  const W  = cv.offsetWidth || 580;
  cv.width  = W * devicePixelRatio;
  cv.height = 260 * devicePixelRatio;
  const ctx = cv.getContext('2d');
  ctx.scale(devicePixelRatio, devicePixelRatio);

  const pad = { l:44, r:20, t:16, b:30 };
  const w = W - pad.l - pad.r;
  const h = 260 - pad.t - pad.b;

  const maxT = Math.max(120, t2 + 40);
  const ts   = Array.from({length:300}, (_,i) => i * maxT/299);

  const popVals = ts.map(t => solveCONC(t, cl_pop, doses));
  const indVals = ts.map(t => solveCONC(t, cl_ind, doses));
  const maxC    = Math.max(...indVals, ...popVals, ...obs.map(o=>o.dv)) * 1.2;

  function toX(t) { return pad.l + (t/maxT)*w; }
  function toY(c) { return pad.t + h - Math.min(1, c/maxC)*h; }

  ctx.clearRect(0, 0, W, 260);

  ctx.strokeStyle = 'rgba(128,128,128,0.15)';
  ctx.lineWidth = 0.5;
  [0, 0.25, 0.5, 0.75, 1].forEach(f => {
    const y = pad.t + f*h;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l+w, y); ctx.stroke();
    ctx.fillStyle = 'rgba(128,128,128,0.55)';
    ctx.font = `10px var(--font-sans)`;
    ctx.textAlign = 'right';
    ctx.fillText((maxC*(1-f)).toFixed(1), pad.l-4, y+4);
  });
  [0, 24, 48, 72, 96, 120].filter(t => t <= maxT).forEach(t => {
    const x = toX(t);
    ctx.beginPath(); ctx.moveTo(x, pad.t+h); ctx.lineTo(x, pad.t+h+4); ctx.stroke();
    ctx.fillStyle = 'rgba(128,128,128,0.55)';
    ctx.textAlign = 'center';
    ctx.fillText(t+'h', x, pad.t+h+16);
  });

  function drawCurve(vals, color, dash=[]) {
    ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.setLineDash(dash);
    vals.forEach((v,i) => { const x=toX(ts[i]), y=toY(v); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
    ctx.stroke(); ctx.setLineDash([]);
  }

  drawCurve(popVals, '#7F77DD', [5,4]);
  drawCurve(indVals, '#185FA5', []);

  doses.forEach((d, idx) => {
    const x = toX(d.time);
    ctx.strokeStyle = idx === 0 ? '#1D9E75' : '#888780';
    ctx.lineWidth = 1.2; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(x, pad.t); ctx.lineTo(x, pad.t+h); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = idx === 0 ? '#1D9E75' : '#888780';
    ctx.font = `10px var(--font-sans)`; ctx.textAlign = 'left';
    ctx.fillText(idx===0?'D₁':'D₂', x+3, pad.t+12);
  });

  obs.forEach(o => {
    const x = toX(o.t), y = toY(o.dv);
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI*2);
    ctx.fillStyle = '#D85A30'; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.2; ctx.stroke();
    const pred_ind = solveCONC(o.t, cl_ind, doses);
    ctx.strokeStyle = '#D85A30'; ctx.lineWidth = 1; ctx.setLineDash([2,2]);
    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, toY(pred_ind)); ctx.stroke();
    ctx.setLineDash([]);
  });
}

['wt','alb','d1','t2','d2','dv1','dv2'].forEach(id => {
  document.getElementById(id).addEventListener('input', update);
});
update();
window.addEventListener('resize', update);
</script>
